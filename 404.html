<script>
    (function () {
        // Referral deep link fallback: /ref/CODE → /ref/?code=CODE so the
        // Jekyll-rendered landing page at /ref/ can pick up the invite code.
        var refMatch = window.location.pathname.match(/^\/ref\/([A-Za-z0-9_-]+)\/?$/);
        if (refMatch) {
            window.location.replace("/ref/?code=" + encodeURIComponent(refMatch[1]));
            return;
        }
        window.location.href = "/categories";
    })();
</script>

<div class="text-center">
<h1 class="mt-5"><span class="badge badge-dark font-weight-normal">404</span></h1>
<h1 class="display-1 mt-4 mb-4"> Page not found!</h1>
<p>Please use the search bar from the bottom left or visit our <a href="{{site.baseurl}}/categories/">Posts Page</a>!</p>
</div>
